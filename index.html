<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f6f3ec">
<title>Training Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f6f3ec;
    --card:#fffdf8;
    --card-2:#f1ece1;
    --ink:#1f1d18;
    --soft:#6b6557;
    --faint:#9a9283;
    --line:#dcd6c8;
    --accent:#b5482a;
    --accent-soft:#f0e4dd;
    --good:#3f8f5e;
    --radius:14px;
    --radius-sm:11px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:'Spline Sans',system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.55;
    padding:max(26px,env(safe-area-inset-top)) 16px calc(48px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:600px;margin:0 auto;}

  header{
    border-bottom:2px solid var(--ink);
    padding-bottom:18px;
    margin-bottom:22px;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
    margin-bottom:10px;
  }
  .top{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:12px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:clamp(32px,9vw,46px);
    letter-spacing:-.01em;
    line-height:.98;
  }
  .date{
    font-size:13px;
    color:var(--soft);
    text-align:right;
    white-space:nowrap;
  }
  .date b{display:block;color:var(--ink);font-size:14px;font-weight:600;}

  .streak{
    margin-top:18px;
    display:flex;
    gap:10px;
  }
  .stat{
    flex:1;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    padding:13px 14px;
  }
  .stat .n{
    font-family:'Fraunces',serif;
    font-size:26px;
    font-weight:600;
    line-height:1;
  }
  .stat .n .accent{color:var(--accent);}
  .stat .l{font-size:11px;color:var(--soft);letter-spacing:.05em;margin-top:7px;text-transform:uppercase;}

  .daybar{
    display:flex;
    gap:7px;
    overflow-x:auto;
    padding:4px 0 8px;
    margin:22px 0 6px;
    scrollbar-width:none;
  }
  .daybar::-webkit-scrollbar{display:none;}
  .pill{
    flex:0 0 auto;
    background:var(--card);
    border:1px solid var(--line);
    color:var(--soft);
    border-radius:30px;
    padding:9px 17px;
    font-size:13.5px;
    font-weight:500;
    cursor:pointer;
    transition:.15s;
    white-space:nowrap;
    font-family:'Spline Sans',sans-serif;
  }
  .pill:hover{border-color:var(--faint);}
  .pill.active{
    background:var(--accent);
    color:#fff;
    border-color:var(--accent);
    font-weight:600;
  }
  .pill.rest{font-style:italic;}

  .focus{
    font-family:'Fraunces',serif;
    font-size:15px;
    color:var(--soft);
    margin:10px 2px 18px;
  }
  .focus .dot{color:var(--accent);font-style:normal;}

  .ex-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px 17px;
    margin-bottom:11px;
    position:relative;
    overflow:hidden;
  }
  .ex-card::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent);opacity:.85;
  }
  .ex-card.complete::before{background:var(--good);}
  .ex-top{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:10px;
    margin-bottom:13px;
  }
  .ex-title{font-size:16px;font-weight:600;display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;}
  .ex-title .chev{font-size:12px;color:var(--faint);transition:transform .2s;display:inline-block;}
  .ex-card.open .ex-title .chev{transform:rotate(90deg);color:var(--accent);}
  .howto{
    display:none;
    margin-top:14px;
    padding-top:14px;
    border-top:1px dashed var(--line);
  }
  .ex-card.open .howto{display:block;}
  .howto-diagram{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    padding:10px;
    margin-bottom:13px;
    display:flex;justify-content:center;
  }
  .howto-diagram svg{width:140px;height:auto;color:var(--ink);}
  .howto-block{margin-bottom:11px;}
  .howto-block:last-child{margin-bottom:0;}
  .howto-block .h{
    font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;
    color:var(--accent);margin-bottom:3px;
  }
  .howto-block.warn .h{color:var(--soft);}
  .howto-block p{font-size:13.5px;color:var(--ink);line-height:1.5;}
  .howto-block.warn p{color:var(--soft);}
  .ex-target{
    font-family:'Fraunces',serif;
    font-size:15px;
    font-weight:600;
    color:var(--accent);
    white-space:nowrap;
  }
  .inputs{display:flex;gap:9px;}
  .field{flex:1;}
  .field label{
    display:block;
    font-size:11px;
    color:var(--faint);
    text-transform:uppercase;
    letter-spacing:.06em;
    margin-bottom:5px;
  }
  .field input{
    width:100%;
    background:var(--paper);
    border:1px solid var(--line);
    color:var(--ink);
    font-family:'Spline Sans',sans-serif;
    font-size:17px;
    font-weight:500;
    padding:11px 12px;
    border-radius:var(--radius-sm);
    outline:none;
    transition:.15s;
  }
  .field input:focus{border-color:var(--accent);background:#fff;}
  .field input::placeholder{color:var(--faint);font-weight:400;}
  .done-toggle{
    flex:0 0 auto;
    align-self:flex-end;
    width:46px;height:44px;
    border-radius:var(--radius-sm);
    border:1px solid var(--line);
    background:var(--paper);
    color:var(--faint);
    font-size:19px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:.15s;
  }
  .done-toggle.on{
    background:var(--good);
    border-color:var(--good);
    color:#fff;
  }

  .rest-msg{
    background:var(--card);
    border:1px dashed var(--line);
    border-radius:var(--radius);
    padding:32px 24px;
    text-align:center;
  }
  .rest-msg .big{
    font-family:'Fraunces',serif;
    font-size:24px;
    font-weight:600;
    margin-bottom:9px;
  }
  .rest-msg p{font-size:14.5px;color:var(--soft);max-width:360px;margin:0 auto;line-height:1.5;}

  .actions{
    display:flex;
    gap:10px;
    margin-top:16px;
  }
  .actions:empty{display:none;}
  .btn{
    flex:1;
    background:var(--card);
    border:1px solid var(--line);
    color:var(--ink);
    font-family:'Spline Sans',sans-serif;
    font-size:13.5px;
    font-weight:600;
    padding:13px;
    border-radius:var(--radius-sm);
    cursor:pointer;
    transition:.15s;
  }
  .btn:hover{border-color:var(--faint);}
  .btn:active{transform:scale(.98);}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn.primary.done{background:var(--good);border-color:var(--good);}
  .btn.danger{flex:0 0 auto;color:var(--soft);}
  .btn.danger:hover{border-color:var(--accent);color:var(--accent);}

  .morning-tip{
    margin-top:12px;
    font-size:12.5px;
    color:var(--soft);
    padding:11px 14px;
    background:var(--accent-soft);
    border-radius:var(--radius-sm);
  }
  .morning-tip b{color:var(--ink);font-weight:600;}
  .morning-tip:empty{display:none;}

  .save-note{
    text-align:center;
    font-size:12px;
    color:var(--faint);
    margin-top:22px;
    letter-spacing:.03em;
    transition:.3s;
  }
  .save-note.flash{color:var(--accent);font-weight:500;}

  @media(max-width:520px){
    body{padding:22px 14px 80px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Strength &amp; Build Program</div>
    <div class="top">
      <h1>Training Log</h1>
      <div class="date"><b id="today-d">—</b><span id="today-m">—</span></div>
    </div>
    <div class="streak">
      <div class="stat"><div class="n" id="stat-week"><span class="accent">0</span>/5</div><div class="l">This week</div></div>
      <div class="stat"><div class="n" id="stat-total">0</div><div class="l">Sessions done</div></div>
      <div class="stat"><div class="n" id="stat-streak">0</div><div class="l">Day streak</div></div>
    </div>
  </header>

  <div class="daybar" id="daybar"></div>
  <div class="focus" id="focus"></div>

  <div id="content"></div>

  <div class="actions" id="actions"></div>
  <div class="morning-tip" id="morningtip"></div>
  <div class="save-note" id="savenote">Saved automatically on this device</div>
</div>

<script>
// Shared exercise guide library. Each entry: setup / motion / mistakes + a simple SVG diagram.
// Diagrams use currentColor so they inherit the page ink color and work on the paper theme.
const EXERCISE_GUIDE = {
  "Push-ups": {
    setup: "Hands flat on the floor a bit wider than your shoulders, arms straight. Legs out behind you, body in one straight line from head to heels. Squeeze your bum and brace your stomach.",
    motion: "Bend your elbows and lower your chest toward the floor until it's about a fist's height away. Elbows point back at roughly 45°, not straight out. Push back up to the start, keeping the line straight.",
    mistakes: "Sagging hips (keep the bum squeezed), flaring elbows straight out to the sides, only going halfway down. Too hard? Put your knees on the floor.",
    svg: `<line x1="22" y1="78" x2="118" y2="78" /><circle cx="34" cy="54" r="7" /><line x1="40" y1="58" x2="104" y2="70" /><line x1="104" y1="70" x2="120" y2="78" /><line x1="55" y1="62" x2="52" y2="78" /><line x1="62" y1="63" x2="66" y2="78" />`
  },
  "DB bench press": {
    setup: "Lie on your back on the bench, feet flat on the floor. Hold a dumbbell in each hand at chest level, just outside your chest, palms facing your feet.",
    motion: "Press both dumbbells straight up until your arms are nearly straight (don't lock hard), bringing them close together at the top. Lower slowly back to your chest. Keep your shoulder blades pulled back and down into the bench.",
    mistakes: "Bouncing the weights off your chest, arching your lower back off the bench, going too heavy and losing control. Start light to learn the path.",
    svg: `<line x1="20" y1="80" x2="100" y2="80" /><line x1="30" y1="80" x2="30" y2="64" /><line x1="90" y1="80" x2="90" y2="64" /><line x1="28" y1="64" x2="92" y2="64" /><circle cx="58" cy="56" r="6" /><line x1="58" y1="62" x2="44" y2="40" /><line x1="58" y1="62" x2="72" y2="40" /><rect x="38" y="34" width="12" height="8" rx="2" /><rect x="66" y="34" width="12" height="8" rx="2" />`
  },
  "DB shoulder press": {
    setup: "Sit tall on the bench (or stand). Hold a dumbbell in each hand at shoulder height, palms facing forward, elbows pointing down and slightly forward.",
    motion: "Press both dumbbells up overhead until your arms are nearly straight, bringing them slightly together at the top. Lower under control back to shoulder height. Keep your ribs down — don't lean back.",
    mistakes: "Leaning back and turning it into a chest press, arching the lower back, banging the weights together at the top. Keep the core braced.",
    svg: `<circle cx="60" cy="30" r="8" /><line x1="60" y1="38" x2="60" y2="66" /><line x1="60" y1="44" x2="42" y2="30" /><line x1="60" y1="44" x2="78" y2="30" /><rect x="36" y="22" width="12" height="9" rx="2" /><rect x="72" y="22" width="12" height="9" rx="2" /><line x1="60" y1="66" x2="50" y2="86" /><line x1="60" y1="66" x2="70" y2="86" />`
  },
  "One-arm DB row": {
    setup: "Put one knee and the same-side hand on the bench. Other foot on the floor, back flat and roughly parallel to the ground. Hold a dumbbell in your free hand, arm hanging straight down.",
    motion: "Pull the dumbbell up toward your hip, leading with your elbow and squeezing your shoulder blade back. Lower it all the way down under control. Keep your back flat and still — don't twist.",
    mistakes: "Rotating your torso to yank the weight up, shrugging the shoulder to your ear, rounding the back. Think 'elbow to back pocket'.",
    svg: `<line x1="20" y1="84" x2="78" y2="84" /><line x1="30" y1="84" x2="30" y2="70" /><line x1="70" y1="84" x2="70" y2="70" /><line x1="28" y1="70" x2="72" y2="70" /><circle cx="92" cy="50" r="7" /><line x1="86" y1="54" x2="50" y2="66" /><line x1="50" y1="66" x2="40" y2="70" /><line x1="92" y1="57" x2="100" y2="74" /><rect x="94" y="74" width="12" height="8" rx="2" /><line x1="100" y1="56" x2="100" y2="46" />`
  },
  "Assisted pull-ups": {
    setup: "Use the pull-up bar with feet on a box or a band for help. Grab the bar a bit wider than shoulders, palms facing away. Hang with arms straight, shoulders pulled down (not up at your ears).",
    motion: "Pull your chest toward the bar by driving your elbows down and back, until your chin clears the bar. Lower all the way down slowly. Let the box/band take just enough weight that you can do clean reps.",
    mistakes: "Kipping or swinging, not going all the way down, shrugging. Slow lowering (negatives) builds the most strength early on.",
    svg: `<line x1="20" y1="20" x2="100" y2="20" /><line x1="48" y1="20" x2="48" y2="34" /><line x1="72" y1="20" x2="72" y2="34" /><circle cx="60" cy="42" r="7" /><line x1="60" y1="49" x2="60" y2="74" /><line x1="60" y1="55" x2="48" y2="34" /><line x1="60" y1="55" x2="72" y2="34" /><line x1="60" y1="74" x2="52" y2="88" /><line x1="60" y1="74" x2="68" y2="88" />`
  },
  "Bicep curls": {
    setup: "Stand tall, a dumbbell in each hand by your sides, palms facing forward. Elbows tucked close to your ribs, shoulders relaxed.",
    motion: "Bend your elbows and curl the dumbbells up toward your shoulders, keeping your upper arms still. Squeeze at the top, then lower slowly all the way down until arms are straight.",
    mistakes: "Swinging the body to throw the weight up, elbows drifting forward, half reps. Keep upper arms pinned and let only the forearms move.",
    svg: `<circle cx="60" cy="26" r="8" /><line x1="60" y1="34" x2="60" y2="70" /><line x1="60" y1="42" x2="48" y2="52" /><line x1="48" y1="52" x2="52" y2="38" /><line x1="60" y1="42" x2="72" y2="52" /><line x1="72" y1="52" x2="68" y2="38" /><rect x="46" y="32" width="11" height="8" rx="2" /><rect x="63" y="32" width="11" height="8" rx="2" /><line x1="60" y1="70" x2="52" y2="88" /><line x1="60" y1="70" x2="68" y2="88" />`
  },
  "Goblet squats": {
    setup: "Hold one dumbbell vertically against your chest with both hands cupping the top end (like a goblet). Feet about shoulder-width, toes turned out slightly. Stand tall, chest up.",
    motion: "Push your hips back and bend your knees to lower down, keeping your chest up and heels on the floor. Go until your thighs are about parallel to the floor (or as low as comfy). Drive up through your heels to stand.",
    mistakes: "Knees caving inward (push them out over your toes), heels lifting, rounding the back, leaning too far forward. Keep the chest proud.",
    svg: `<circle cx="60" cy="22" r="8" /><line x1="60" y1="30" x2="60" y2="52" /><rect x="54" y="34" width="12" height="14" rx="2" /><line x1="60" y1="52" x2="44" y2="64" /><line x1="44" y1="64" x2="44" y2="84" /><line x1="60" y1="52" x2="76" y2="64" /><line x1="76" y1="64" x2="76" y2="84" /><line x1="38" y1="84" x2="82" y2="84" />`
  },
  "DB Romanian deadlift": {
    setup: "Stand tall holding a dumbbell in each hand in front of your thighs, palms facing you. Feet hip-width, knees softly bent (not locked, not a deep bend).",
    motion: "Push your hips straight back and slide the dumbbells down the front of your legs, keeping your back flat and chest up. Feel a stretch in the back of your thighs, then drive your hips forward to stand tall and squeeze your glutes.",
    mistakes: "Rounding the back, squatting instead of hinging at the hips, letting the weights drift away from your legs. It's a hip hinge, not a squat.",
    svg: `<circle cx="48" cy="28" r="8" /><line x1="48" y1="36" x2="72" y2="54" /><line x1="72" y1="54" x2="72" y2="84" /><line x1="55" y1="44" x2="55" y2="64" /><rect x="49" y="62" width="12" height="8" rx="2" /><line x1="38" y1="84" x2="84" y2="84" /><path d="M48 36 q-6 12 4 22" fill="none" />`
  },
  "Walking lunges": {
    setup: "Stand tall, a dumbbell in each hand by your sides (or just bodyweight). Feet hip-width, core braced, eyes forward.",
    motion: "Step forward with one leg and lower until both knees are bent about 90°, back knee hovering just above the floor. Push through your front heel to stand, then step the back foot through into the next lunge.",
    mistakes: "Front knee caving in or shooting way past the toes, leaning forward, tiny steps. Take a long enough step and keep the torso upright.",
    svg: `<circle cx="50" cy="24" r="7" /><line x1="50" y1="31" x2="50" y2="56" /><line x1="50" y1="56" x2="34" y2="84" /><line x1="50" y1="56" x2="74" y2="68" /><line x1="74" y1="68" x2="74" y2="84" /><line x1="50" y1="40" x2="42" y2="54" /><line x1="50" y1="40" x2="58" y2="54" /><rect x="36" y="52" width="10" height="7" rx="2" /><rect x="55" y="52" width="10" height="7" rx="2" /><line x1="26" y1="84" x2="84" y2="84" />`
  },
  "Step-ups on box": {
    setup: "Stand facing a sturdy box or bench, dumbbells by your sides or hands free. Box height where your thigh is about parallel when your foot's on top.",
    motion: "Place one whole foot flat on the box. Push through that heel to stand all the way up on the box, bringing the other foot up. Step back down with control, same leg leading. Finish your reps, then swap legs.",
    mistakes: "Pushing off the back foot's toes instead of driving through the top foot, slamming back down, letting the knee cave in. Let the top leg do the work.",
    svg: `<rect x="64" y="58" width="34" height="26" /><circle cx="46" cy="28" r="7" /><line x1="46" y1="35" x2="52" y2="58" /><line x1="52" y1="58" x2="72" y2="58" /><line x1="46" y1="42" x2="40" y2="58" /><line x1="40" y1="58" x2="40" y2="84" /><line x1="46" y1="38" x2="38" y2="48" /><line x1="46" y1="38" x2="54" y2="48" /><line x1="20" y1="84" x2="98" y2="84" />`
  },
  "Calf raises": {
    setup: "Stand tall with the balls of your feet on the edge of a step or the floor, heels free to drop. Hold something for balance if needed; a dumbbell in one hand for extra load.",
    motion: "Push up onto your toes as high as you can, squeezing your calves at the top. Pause for a beat, then lower your heels slowly all the way down for a good stretch. Repeat.",
    mistakes: "Bouncing fast with no control, tiny range of motion, not pausing at the top. Slow and full range is what works the calf.",
    svg: `<circle cx="60" cy="24" r="8" /><line x1="60" y1="32" x2="60" y2="64" /><line x1="60" y1="40" x2="50" y2="52" /><line x1="60" y1="40" x2="70" y2="52" /><line x1="60" y1="64" x2="52" y2="78" /><line x1="60" y1="64" x2="68" y2="78" /><line x1="48" y1="78" x2="56" y2="78" /><line x1="64" y1="78" x2="72" y2="78" /><line x1="44" y1="84" x2="76" y2="84" /><path d="M52 78 l-4 6" /><path d="M68 78 l4 6" />`
  },
  "Swiss-ball leg curls": {
    setup: "Lie on your back on the floor, heels resting on top of the swiss ball, legs straight. Arms flat by your sides for stability.",
    motion: "Lift your hips so your body's in a straight line from shoulders to heels. Then bend your knees and roll the ball in toward your bum with your heels. Roll it back out slowly, keeping your hips up the whole time.",
    mistakes: "Letting the hips drop, using arms to push, rushing. Keep hips lifted and let the back of the thighs do the curling.",
    svg: `<circle cx="84" cy="62" r="20" fill="none" /><line x1="20" y1="60" x2="64" y2="60" /><circle cx="22" cy="56" r="6" /><line x1="64" y1="60" x2="78" y2="50" /><line x1="34" y1="60" x2="40" y2="50" /><line x1="40" y1="50" x2="52" y2="54" />`
  },
  "Bike or rower": {
    setup: "On the bike: set the seat so your knee has a slight bend at the bottom of the pedal stroke. On the rower: strap your feet in, sit tall, grab the handle with straight arms.",
    motion: "Bike: pedal at a steady pace you can keep up, or alternate 30s hard / 90s easy for intervals. Rower: push with your legs first, then lean back slightly, then pull the handle to your ribs — reverse the order coming back. Smooth and rhythmic.",
    mistakes: "Rowing with mostly arms (it's legs → body → arms), hunching the back, going so hard you burn out in two minutes. Pace it.",
    svg: `<circle cx="38" cy="74" r="12" fill="none" /><circle cx="86" cy="74" r="12" fill="none" /><line x1="38" y1="74" x2="62" y2="44" /><line x1="62" y1="44" x2="86" y2="74" /><line x1="62" y1="44" x2="62" y2="30" /><line x1="50" y1="30" x2="74" y2="30" /><circle cx="62" cy="22" r="6" /><line x1="74" y1="30" x2="86" y2="40" />`
  },
  "Plank": {
    setup: "Forearms on the floor, elbows directly under your shoulders. Legs out behind you, toes on the floor. Body in one straight line from head to heels.",

    mistakes: "Hips sagging toward the floor, bum poking up in the air, holding your breath, head dropping. Keep one straight line and keep breathing.",
    svg: `<line x1="20" y1="78" x2="118" y2="78" /><circle cx="38" cy="58" r="7" /><line x1="42" y1="62" x2="104" y2="72" /><line x1="104" y1="72" x2="118" y2="78" /><line x1="44" y1="62" x2="40" y2="78" /><line x1="40" y1="78" x2="52" y2="78" />`

  "Dead bug": {
    setup: "Lie on your back. Arms pointing straight up at the ceiling. Knees bent and lifted so your thighs are vertical and shins parallel to the floor (tabletop). Press your lower back gently into the floor.",

    svg: `<line x1="24" y1="62" x2="92" y2="62" /><circle cx="28" cy="58" r="6" /><line x1="40" y1="62" x2="40" y2="44" /><line x1="40" y1="44" x2="56" y2="44" /><line x1="64" y1="62" x2="80" y2="50" /><line x1="80" y1="50" x2="92" y2="54" /><line x1="50" y1="62" x2="58" y2="48" />`

  "Russian twists": {
    setup: "Sit on the floor, knees bent, feet flat (or lifted for harder). Lean back slightly so your stomach is working, back straight. Hold your hands together or a light weight at your chest.",
    motion: "Twist your torso to one side, bringing your hands toward the floor beside your hip. Twist to the other side. Keep the movement coming from your waist, not just your arms. Control the speed.",

    svg: `<circle cx="60" cy="30" r="8" /><line x1="60" y1="38" x2="60" y2="58" /><line x1="60" y1="58" x2="40" y2="74" /><line x1="40" y1="74" x2="40" y2="74" /><line x1="60" y1="58" x2="80" y2="68" /><line x1="60" y1="44" x2="78" y2="50" /><line x1="60" y1="44" x2="80" y2="44" /><path d="M44 30 q16 -10 32 0" fill="none" /><line x1="30" y1="80" x2="90" y2="80" />`

  "Hanging knee raises": {
    setup: "Hang from the pull-up bar, arms straight, shoulders pulled down (not at your ears). Legs straight down, body still.",

    svg: `<line x1="20" y1="18" x2="100" y2="18" /><line x1="50" y1="18" x2="50" y2="32" /><line x1="70" y1="18" x2="70" y2="32" /><circle cx="60" cy="40" r="7" /><line x1="60" y1="47" x2="60" y2="66" /><line x1="60" y1="50" x2="50" y2="32" /><line x1="60" y1="50" x2="70" y2="32" /><line x1="60" y1="66" x2="74" y2="64" /><line x1="74" y1="64" x2="74" y2="78" />`
  },
  "Swiss-ball rollouts": {
    setup: "Kneel on the floor with your forearms resting on top of the swiss ball, hands together. Brace your stomach, body in a straight line from knees to head.",
    motion: "Slowly roll the ball forward by extending your arms, letting your body lower toward a straight, stretched-out line. Only go as far as you can keep your back flat. Pull the ball back in by bracing your stomach.",
    mistakes: "Letting the lower back sag/arch as you roll out, going too far too soon, using arms instead of core. Keep the stomach tight the whole way.",
    svg: `<circle cx="86" cy="58" r="16" fill="none" /><circle cx="34" cy="44" r="7" /><line x1="38" y1="48" x2="74" y2="56" /><line x1="38" y1="48" x2="40" y2="78" /><line x1="40" y1="78" x2="56" y2="78" /><line x1="74" y1="56" x2="80" y2="50" />`

  "Incline DB press": {

    mistakes: "Setting the bench too steep (turns into a shoulder press), bouncing off the chest, arching hard. A low-to-moderate incline is plenty.",
    svg: `<line x1="22" y1="84" x2="58" y2="56" /><line x1="58" y1="56" x2="92" y2="56" /><line x1="40" y1="70" x2="40" y2="84" /><line x1="88" y1="56" x2="88" y2="84" /><circle cx="56" cy="48" r="6" /><line x1="56" y1="54" x2="44" y2="36" /><line x1="56" y1="54" x2="68" y2="36" /><rect x="38" y="30" width="11" height="7" rx="2" /><rect x="64" y="30" width="11" height="7" rx="2" /><line x1="18" y1="86" x2="96" y2="86" />`
  },
  "DB row": {
    setup: "Hold a dumbbell in each hand, hinge forward at the hips so your back is flat and chest points roughly at the floor ahead, knees softly bent. Arms hang straight down.",
    motion: "Pull both dumbbells up toward your hips, leading with your elbows and squeezing your shoulder blades together. Lower under control all the way down. Keep your back flat and torso still.",
    mistakes: "Standing up as you pull (using the back to swing), rounding the spine, shrugging. Stay hinged and pull the elbows toward your back pockets.",
    svg: `<circle cx="34" cy="40" r="7" /><line x1="40" y1="44" x2="80" y2="56" /><line x1="80" y1="56" x2="80" y2="84" /><line x1="55" y1="50" x2="55" y2="66" /><rect x="49" y="64" width="12" height="8" rx="2" /><line x1="68" y1="54" x2="68" y2="70" /><rect x="62" y="68" width="12" height="8" rx="2" /><line x1="60" y1="84" x2="98" y2="84" />`
  },
  "Lateral raises": {
    setup: "Stand tall, a light dumbbell in each hand by your sides, palms facing your body, slight bend in the elbows. Core braced, shoulders relaxed down.",
    motion: "Raise both arms out to the sides until they're about shoulder height, like making a 'T'. Lead with your elbows, little fingers slightly up. Lower slowly. Use light weight — this one's all control.",
    mistakes: "Going too heavy and swinging, shrugging the shoulders up, lifting way above shoulder height. Keep it slow with light weights.",
    svg: `<circle cx="60" cy="26" r="8" /><line x1="60" y1="34" x2="60" y2="66" /><line x1="60" y1="42" x2="38" y2="40" /><line x1="60" y1="42" x2="82" y2="40" /><rect x="28" y="36" width="11" height="8" rx="2" /><rect x="81" y="36" width="11" height="8" rx="2" /><line x1="60" y1="66" x2="52" y2="86" /><line x1="60" y1="66" x2="68" y2="86" />`
  },
  "Pull-ups / negatives": {
    setup: "Grab the bar a bit wider than shoulders, palms facing away. For negatives: step up off a box so your chin already starts above the bar, arms bent.",
    motion: "Full pull-up: hang with straight arms, pull your chest to the bar, lower slowly. Negatives (easier, great for building up): start at the top with chin over the bar, then lower yourself down as slowly as you can — aim for 3–5 seconds. Step back up and repeat.",
    mistakes: "Swinging/kipping, dropping fast on the negative (the slow lower is the whole point), not using full range. Negatives build the strength to get your first real pull-up.",
    svg: `<line x1="20" y1="20" x2="100" y2="20" /><line x1="48" y1="20" x2="48" y2="34" /><line x1="72" y1="20" x2="72" y2="34" /><circle cx="60" cy="44" r="7" /><line x1="60" y1="51" x2="60" y2="76" /><line x1="60" y1="56" x2="48" y2="34" /><line x1="60" y1="56" x2="72" y2="34" /><line x1="60" y1="76" x2="52" y2="90" /><line x1="60" y1="76" x2="68" y2="90" />`
  },
  "Hammer curls": {
    setup: "Stand tall, a dumbbell in each hand by your sides, palms facing your body (thumbs forward) — like holding two hammers. Elbows tucked to your ribs.",
    motion: "Curl the dumbbells up toward your shoulders keeping the palms facing in the whole time. Keep upper arms still. Squeeze at the top, lower slowly all the way down. Works the forearm and outer bicep.",
    mistakes: "Swinging the body, elbows drifting forward, rotating the wrists. Keep palms facing each other and only the forearms move.",
    svg: `<circle cx="60" cy="26" r="8" /><line x1="60" y1="34" x2="60" y2="70" /><line x1="60" y1="42" x2="48" y2="52" /><line x1="48" y1="52" x2="50" y2="38" /><line x1="60" y1="42" x2="72" y2="52" /><line x1="72" y1="52" x2="70" y2="38" /><rect x="45" y="34" width="8" height="11" rx="2" /><rect x="67" y="34" width="8" height="11" rx="2" /><line x1="60" y1="70" x2="52" y2="88" /><line x1="60" y1="70" x2="68" y2="88" />`
  },
  "Tricep extensions": {
    setup: "Hold one dumbbell with both hands and raise it straight overhead, arms extended. Or lie on the bench and hold dumbbells above your chest. Elbows pointing up/forward, tucked in.",
    motion: "Bend at the elbows to lower the weight behind your head (overhead version), keeping your upper arms still and pointing up. Straighten your arms to press back up, squeezing the triceps at the top.",
    mistakes: "Elbows flaring out wide, upper arms swinging, going too heavy and straining the elbows. Keep the elbows in and pointing forward, move only the forearms.",
    svg: `<circle cx="60" cy="44" r="8" /><line x1="60" y1="52" x2="60" y2="84" /><line x1="60" y1="56" x2="48" y2="40" /><line x1="48" y1="40" x2="46" y2="26" /><line x1="60" y1="56" x2="72" y2="40" /><line x1="72" y1="40" x2="74" y2="26" /><rect x="40" y="20" width="40" height="8" rx="3" /><line x1="60" y1="84" x2="52" y2="98" /><line x1="60" y1="84" x2="68" y2="98" />`
  },
  "Goblet squat": {
    setup: "Hold one dumbbell vertically against your chest, both hands cupping the top end. Feet about shoulder-width, toes slightly out. Stand tall, chest up, core braced.",
    motion: "Push your hips back and bend your knees to lower down, chest up and heels planted. Go to about thighs-parallel or as deep as you can keep good form. Drive up through your heels to stand tall.",
    mistakes: "Knees caving in, heels lifting, rounding the back, leaning forward. Push the knees out and keep the chest proud the whole way.",
    svg: `<circle cx="60" cy="22" r="8" /><line x1="60" y1="30" x2="60" y2="52" /><rect x="54" y="34" width="12" height="14" rx="2" /><line x1="60" y1="52" x2="44" y2="64" /><line x1="44" y1="64" x2="44" y2="84" /><line x1="60" y1="52" x2="76" y2="64" /><line x1="76" y1="64" x2="76" y2="84" /><line x1="38" y1="84" x2="82" y2="84" />`
  },
  "Box step-ups": {
    setup: "Stand facing a sturdy box or bench, dumbbells by your sides or hands free. Pick a height where your thigh is about parallel when your foot's on top.",
    motion: "Put one whole foot flat on the box. Drive through that heel to stand all the way up, bringing the other foot up. Step down with control, same leg leading. Do your reps, then swap legs.",
    mistakes: "Pushing off the bottom foot's toes, slamming down, knee caving inward. Make the top leg do the lifting and lower yourself slowly.",
    svg: `<rect x="64" y="58" width="34" height="26" /><circle cx="46" cy="28" r="7" /><line x1="46" y1="35" x2="52" y2="58" /><line x1="52" y1="58" x2="72" y2="58" /><line x1="46" y1="42" x2="40" y2="58" /><line x1="40" y1="58" x2="40" y2="84" /><line x1="46" y1="38" x2="38" y2="48" /><line x1="46" y1="38" x2="54" y2="48" /><line x1="20" y1="84" x2="98" y2="84" />`
  }
};


const PLAN = {
  Mon:{focus:"Upper body · chest, back, shoulders, arms", morning:"2 sets max push-ups + 30s plank",
    ex:[
      {n:"Push-ups",t:"3 × 8–12"},
      {n:"DB bench press",t:"3 × 10"},
      {n:"DB shoulder press",t:"3 × 10"},
      {n:"One-arm DB row",t:"3 × 10 ea"},
      {n:"Assisted pull-ups",t:"3 × 5"},
      {n:"Bicep curls",t:"3 × 12"},
    ]},
  Tue:{focus:"Lower body · legs & glutes", morning:"2 sets of 20 bodyweight squats",
    ex:[
      {n:"Goblet squats",t:"3 × 12"},
      {n:"DB Romanian deadlift",t:"3 × 10"},
      {n:"Walking lunges",t:"3 × 10 ea"},
      {n:"Step-ups on box",t:"3 × 10 ea"},
      {n:"Calf raises",t:"3 × 15"},
      {n:"Swiss-ball leg curls",t:"3 × 12"},
    ]},
  Wed:{focus:"Cardio & core · lighter day", morning:"Rest or a light stretch",
    ex:[
      {n:"Bike or rower",t:"20–25 min"},
      {n:"Plank",t:"3 × 30s"},
      {n:"Dead bug",t:"3 × 10"},
      {n:"Russian twists",t:"3 × 15"},
      {n:"Hanging knee raises",t:"3 × 8"},
      {n:"Swiss-ball rollouts",t:"3 × 8"},
    ]},
  Thu:{focus:"Upper body · different angles", morning:"2 sets max push-ups",
    ex:[
      {n:"Incline DB press",t:"3 × 10"},
      {n:"DB row",t:"3 × 10 ea"},
      {n:"Lateral raises",t:"3 × 12"},
      {n:"Pull-ups / negatives",t:"3 × 5"},
      {n:"Hammer curls",t:"3 × 12"},
      {n:"Tricep extensions",t:"3 × 12"},
    ]},
  Fri:{focus:"Full body · finish the week", morning:"Rest or light stretch",
    ex:[
      {n:"Goblet squat",t:"3 × 12"},
      {n:"Push-ups",t:"3 × max"},
      {n:"DB Romanian deadlift",t:"3 × 10"},
      {n:"DB shoulder press",t:"3 × 10"},
      {n:"Box step-ups",t:"3 × 10 ea"},
      {n:"Plank",t:"3 × 40s"},
    ]},
  Sat:{rest:true, focus:"Active & fun", title:"Get out and move",
    body:"Sport, bike ride, swim, walk, footy — anything active you enjoy for 30–60 minutes."},
  Sun:{rest:true, focus:"Rest day", title:"Rest up",
    body:"Full rest. Muscle grows now, not in the gym. Focus on sleep and good food."},
};
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const KEY = "training-log-v1";

let store = {};
try{ store = JSON.parse(localStorage.getItem(KEY)) || {}; }catch(e){ store = {}; }

function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(store)); }catch(e){}
  const note = document.getElementById("savenote");
  note.textContent = "Saved";
  note.classList.add("flash");
  clearTimeout(window._st);
  window._st = setTimeout(()=>{ note.classList.remove("flash"); note.textContent="Saved automatically on this device"; },1400);
}

function weekId(d){
  const t = new Date(d); t.setHours(0,0,0,0);
  const day = (t.getDay()+6)%7;
  t.setDate(t.getDate()-day);
  const y=t.getFullYear(), m=String(t.getMonth()+1).padStart(2,"0"), dd=String(t.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}
function curDayName(){ return DAYS[(new Date().getDay()+6)%7]; }
function recordKey(dayName){ return weekId(new Date()) + "::" + dayName; }

let selected = curDayName();

function howtoHTML(name){
  const g = EXERCISE_GUIDE[name];
  if(!g) return "";
  return `<div class="howto">
    <div class="howto-diagram"><svg viewBox="0 0 120 104" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${g.svg}</svg></div>
    <div class="howto-block"><div class="h">Setup</div><p>${g.setup}</p></div>
    <div class="howto-block"><div class="h">The motion</div><p>${g.motion}</p></div>
    <div class="howto-block warn"><div class="h">Common mistakes</div><p>${g.mistakes}</p></div>
  </div>`;
}

function render(){
  const now = new Date();
  document.getElementById("today-d").textContent = now.toLocaleDateString(undefined,{weekday:"long"});
  document.getElementById("today-m").textContent = now.toLocaleDateString(undefined,{day:"numeric",month:"short"});

  const bar = document.getElementById("daybar");
  bar.innerHTML = "";
  DAYS.forEach(d=>{
    const p = document.createElement("button");
    p.className = "pill" + (d===selected?" active":"") + (PLAN[d].rest?" rest":"");
    p.textContent = d;
    p.onclick = ()=>{ selected=d; render(); };
    bar.appendChild(p);
  });

  const day = PLAN[selected];
  document.getElementById("focus").innerHTML = '<span class="dot">●</span> ' + day.focus;

  const content = document.getElementById("content");
  const actions = document.getElementById("actions");
  const tip = document.getElementById("morningtip");
  content.innerHTML = "";

  if(day.rest){
    content.innerHTML = `<div class="rest-msg"><div class="big">${day.title}</div><p>${day.body}</p></div>`;
    actions.innerHTML = "";
    tip.innerHTML = "";
    updateStats();
    return;
  }

  const rk = recordKey(selected);
  if(!store[rk]) store[rk] = {ex:{}, done:false};
  const rec = store[rk];

  day.ex.forEach((e,i)=>{
    const saved = rec.ex[i] || {w:"",r:"",done:false};
    const card = document.createElement("div");
    card.className = "ex-card" + (saved.done?" complete":"");
    card.innerHTML = `
      <div class="ex-top"><div class="ex-title" data-toggle="${i}"><span class="chev">▶</span>${e.n}</div><div class="ex-target">${e.t}</div></div>
      <div class="inputs">
        <div class="field"><label>Weight (kg)</label><input inputmode="decimal" placeholder="–" value="${saved.w}" data-i="${i}" data-f="w"></div>
        <div class="field"><label>Reps done</label><input inputmode="numeric" placeholder="–" value="${saved.r}" data-i="${i}" data-f="r"></div>
        <button class="done-toggle ${saved.done?'on':''}" data-i="${i}" aria-label="mark exercise done">✓</button>
      </div>
      ${howtoHTML(e.n)}`;
    content.appendChild(card);
  });

  content.querySelectorAll("input").forEach(inp=>{
    inp.addEventListener("input", ()=>{
      const i = inp.dataset.i, f = inp.dataset.f;
      if(!rec.ex[i]) rec.ex[i] = {w:"",r:"",done:false};
      rec.ex[i][f] = inp.value;
      save();
    });
  });
  content.querySelectorAll(".done-toggle").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const i = btn.dataset.i;
      if(!rec.ex[i]) rec.ex[i] = {w:"",r:"",done:false};
      rec.ex[i].done = !rec.ex[i].done;
      btn.classList.toggle("on", rec.ex[i].done);
      btn.closest(".ex-card").classList.toggle("complete", rec.ex[i].done);
      rec.done = day.ex.every((_,k)=> rec.ex[k] && rec.ex[k].done);
      save(); updateStats(); refreshFinishBtn();
    });
  });

  content.querySelectorAll(".ex-title[data-toggle]").forEach(title=>{
    title.addEventListener("click", ()=>{
      title.closest(".ex-card").classList.toggle("open");
    });
  });

  actions.innerHTML = `
    <button class="btn primary" id="finishbtn">Mark session complete</button>
    <button class="btn danger" id="clearbtn">Clear</button>`;
  document.getElementById("finishbtn").onclick = ()=>{
    day.ex.forEach((_,k)=>{ if(!rec.ex[k]) rec.ex[k]={w:"",r:"",done:false}; rec.ex[k].done=true; });
    rec.done=true; save(); render();
  };
  document.getElementById("clearbtn").onclick = ()=>{
    delete store[rk]; save(); render();
  };

  tip.innerHTML = `<b>School morning:</b> ${day.morning}`;
  refreshFinishBtn();
  updateStats();
}

function refreshFinishBtn(){
  const day = PLAN[selected];
  if(day.rest) return;
  const rec = store[recordKey(selected)];
  const btn = document.getElementById("finishbtn");
  if(!btn || !rec) return;
  const allDone = day.ex.every((_,k)=> rec.ex[k] && rec.ex[k].done);
  btn.textContent = allDone ? "Session complete" : "Mark session complete";
  btn.classList.toggle("done", allDone);
}

function updateStats(){
  const wk = weekId(new Date());
  let weekDone=0, total=0;
  Object.keys(store).forEach(k=>{
    if(store[k] && store[k].done){
      total++;
      if(k.startsWith(wk+"::")) weekDone++;
    }
  });
  document.getElementById("stat-week").innerHTML = `<span class="accent">${weekDone}</span>/5`;
  document.getElementById("stat-total").textContent = total;

  let streak=0;
  for(let i=0;i<60;i++){
    const d = new Date(); d.setDate(d.getDate()-i);
    const dn = DAYS[(d.getDay()+6)%7];
    if(PLAN[dn].rest) continue;
    const k = weekId(d)+"::"+dn;
    if(store[k] && store[k].done) streak++;
    else if(i>0) break;
  }
  document.getElementById("stat-streak").textContent = streak;
}

render();
</script>
</body>
</html>
